# Pin Docker Engine API version for docker-java (used by Testcontainers).
#
# Background: Modern Docker engines (Docker Desktop 4.52+, OrbStack with
# Docker 29+) require api.version >= 1.44. Older Testcontainers/docker-java
# defaults negotiate v1.32, which the daemon rejects with
# "client version 1.32 is too old. Minimum supported API version is 1.44".
#
# This file is picked up automatically by docker-java from the classpath.
api.version=1.44
