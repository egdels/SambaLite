name: Build on Push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: wrapper

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks

    - name: Build Release APK and Bundle
      run: |
        ./gradlew assembleRelease bundleRelease \
        -PSIGNING_KEY_ALIAS="${SIGNING_KEY_ALIAS}" \
        -PSIGNING_KEY_PASSWORD="${SIGNING_KEY_PASSWORD}" \
        -PSIGNING_STORE_PASSWORD="${SIGNING_STORE_PASSWORD}"
      env:
        SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

    - name: Verify APK signature
      run: |
        aapt dump badging app/build/outputs/apk/release/app-release.apk | head -1
        echo "APK verification completed"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SambaLite-APK
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: SambaLite-AAB
        path: app/build/outputs/bundle/release/app-release.aab
        retention-days: 30

    - name: Clean up keystore
      if: always()
      run: |
        rm -f app/keystore.jks
        echo "Keystore cleaned up"
